name: Exchange Rate Monitor

on:
  schedule:
    - cron: "0 4,14 * * *" # Daily at 4:00 and 14:00 UTC
  workflow_dispatch:
    inputs:
      limit:
        description: "Rate limit threshold (e.g. 294.50)"
        required: false
        type: string

jobs:
  check-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Restore rate cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: exchange-rate-cache-${{ github.run_id }}
          restore-keys: exchange-rate-cache-

      - name: Install dependencies
        run: npm ci

      - name: Run rate monitor
        id: monitor
        run: npm start
        env:
          EXCHANGE_API: ${{ secrets.EXCHANGE_API }}
          LIMIT: ${{ github.event.inputs.limit || vars.EXCHANGE_RATE_LIMIT }}
          SMS_RECIPIENT: ${{ secrets.SMS_RECIPIENT }}
          ESMS_USERNAME: ${{ secrets.ESMS_USERNAME }}
          ESMS_PASSWORD: ${{ secrets.ESMS_PASSWORD }}
          CACHE_FILE: .cache/last-rate.json

      - name: Save rate cache
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: exchange-rate-cache-${{ github.run_id }}
